services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_PATH: /app/data/kart.db
      JWT_SECRET: ${JWT_SECRET:-kart-docker-change-me}
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: password123
    volumes:
      - kart_data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  kart_data:
